<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sera – Sezonul Legumelor Proaspete</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #eaf5ec;
      color: #1f2933;
    }

    .hero {
      text-align: center;
      padding: 34px 20px 26px;
    }

    .hero h1 {
      margin: 0;
      color: #2f6f3e;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.1;
      font-weight: 800;
    }

    .slides {
      width: min(1180px, 96%);
      margin: 0 auto 40px;
    }

    .slides img {
      width: 100%;
      display: block;
      margin-bottom: 28px;
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.16);
      background: #ffffff;
    }

    footer {
      text-align: center;
      padding: 24px 16px 32px;
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .hero {
        padding: 24px 14px 18px;
      }

      .slides {
        width: 100%;
        margin-bottom: 20px;
      }

      .slides img {
        border-radius: 0;
        margin-bottom: 14px;
        box-shadow: none;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <h1>Sera – Sezonul Legumelor Proaspete</h1>
  </header>

  <main class="slides">
