<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sera – Sezonul Legumelor Proaspete</title>
  <style>
    :root {
      --green: #2f6f3e;
      --light-green: #eaf5ec;
      --text: #1f2933;
      --muted: #6b7280;
      --white: #ffffff;
      --border: #d9e6dc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--light-green), #ffffff);
      color: var(--text);
    }

    header {
      padding: 22px 20px 14px;
      text-align: center;
    }

    .container {
      width: min(1280px, 96%);
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--white);
      color: var(--green);
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.1;
    }

    .subtitle {
      max-width: 760px;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px 0 10px;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--green);
    }

    .button.primary {
      background: var(--green);
      color: var(--white);
    }

    .button.secondary {
      background: var(--white);
      color: var(--green);
    }

    .viewer-card {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      margin: 0 auto 20px;
    }

    .viewer-topbar {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: 82vh;
      border: 0;
      display: block;
      background: #f3f4f6;
    }

    footer {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      iframe {
        height: 72vh;
      }

      .viewer-topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="badge">PDF online</div>
      <h1>Sera – Sezonul Legumelor Proaspete</h1>
      <p class="subtitle">
        Material PDF afișat direct în browser prin GitHub Pages.
      </p>

      <div class="actions">
        <a class="button primary" href="docs/Sera-Sezonul-Legumelor-Proaspete.pdf" target="_blank" rel="noopener">
          Deschide PDF-ul
        </a>
        <a class="button secondary" href="docs/Sera-Sezonul-Legumelor-Proaspete.pdf" download>
          Descarcă PDF-ul
        </a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="viewer-card">

      <iframe src="docs/Sera-Sezonul-Legumelor-Proaspete.pdf" title="Sera – Sezonul Legumelor Proaspete PDF">
        Browserul tău nu poate afișa PDF-uri inline.
      </iframe>
    </section>
  </main>

  <footer>
    Publicat cu GitHub Pages.
  </footer>
</body>
</html>
